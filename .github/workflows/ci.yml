name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # -------------------------------------------------------------------------
  # Job 1: fmt — lightweight format check for immediate PR feedback
  # -------------------------------------------------------------------------
  fmt:
    name: Format check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Check formatting
        run: just fmt-check

  # -------------------------------------------------------------------------
  # Job 2: host — clippy + test + integration smoke on native target
  # -------------------------------------------------------------------------
  host:
    name: Host (clippy + test + smoke)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system libudev (required by serialport on Linux)
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libudev-dev pkg-config
          version: 1.0

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Clippy (warnings as errors)
        run: just clippy

      - name: Run tests
        run: just test

      - name: Smoke test host-pty-server
        run: just host-pty-smoke

      - name: Test telepath tool (all feature combinations)
        run: just mcp-test

  # -------------------------------------------------------------------------
  # Job 3: firmware — cross-compile release build for nRF52840-DK
  # -------------------------------------------------------------------------
  firmware:
    name: Firmware (cross-compile nRF52840-DK)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable toolchain with embedded target
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build firmware (release)
        working-directory: examples/nrf52840-ping
        run: cargo build --release
