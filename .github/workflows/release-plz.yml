name: Release-plz

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  # Creates GitHub Release + git tag after the release PR merges.
  # No concurrency block — missing a release is worse than a duplicate attempt.
  release-plz-release:
    # Disabled during Phase 4 initial-publish choreography (RELEASE_PLZ_ENABLED not yet set).
    # Set the repo variable to 'true' after the first manual cargo publish completes.
    if: vars.RELEASE_PLZ_ENABLED == 'true'
    name: Release-plz release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/rust-setup
        with:
          cache-key: release-plz-release

      - id: release-plz
        uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db # v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # tools/telepath is excluded from the root workspace and is not managed by
      # release-plz; publish it manually after the workspace crates are live.
      - name: Publish tools/telepath to crates.io
        if: ${{ steps.release-plz.outputs.releases != '' && steps.release-plz.outputs.releases != '[]' }}
        working-directory: tools/telepath
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Opens / updates the release PR on every push to main.
  # Concurrency: cancel in-flight PR-update runs but never cancel a release run.
  release-plz-pr:
    # Same guard as release-plz-release — both jobs disabled until RELEASE_PLZ_ENABLED='true'.
    if: vars.RELEASE_PLZ_ENABLED == 'true'
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/rust-setup
        with:
          cache-key: release-plz-pr

      - uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db # v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
