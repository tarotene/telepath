name: Release-plz

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  # Creates a draft GitHub Release + git tag after the release PR merges.
  # The `release-binaries` job (below) attaches 4 prebuilt binaries to the draft and
  # then publishes the release via `gh release edit --draft=false`.  This draft→publish
  # approach ensures binaries are attached before the immutable lock is applied.
  #
  # No concurrency block — missing a release is worse than a duplicate attempt.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    outputs:
      # The vX.Y.Z tag created for the telepath-wire crate, if any.  Empty when no new
      # workspace crate release was produced (e.g. host-pty-server-only run).
      tag: ${{ steps.extract-tag.outputs.tag }}
    permissions:
      contents: write
      pull-requests: read
      id-token: write

    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/rust-setup
        with:
          cache-key: release-plz-release

      - id: release-plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      # Extract the vX.Y.Z tag for telepath-wire so the release-binaries job can
      # reference it.  host-pty-server produces a git-only release (no crates.io publish)
      # with a different tag format; we select telepath-wire specifically to get the
      # canonical workspace tag.
      - id: extract-tag
        if: ${{ steps.release-plz.outputs.releases != '' && steps.release-plz.outputs.releases != '[]' }}
        env:
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          tag=$(echo "$RELEASES" \
            | jq -r '.[] | select(.package_name == "telepath-wire") | .tag // empty')
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      # host-pty-server (publish=false) produces a git-only release that appears in
      # the releases output. Skip tools/telepath publishing for git-only releases.
      - id: gate
        if: ${{ steps.release-plz.outputs.releases != '' && steps.release-plz.outputs.releases != '[]' }}
        env:
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          count=$(echo "$RELEASES" | jq '[.[] | select(.package_name != "host-pty-server")] | length')
          echo "should_publish_tools=$([ "$count" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      # tools/telepath is excluded from the root workspace and is not managed by
      # release-plz; publish it manually after the workspace crates are live.
      # release-plz performs its own OIDC exchange internally and does not expose
      # the temporary token to subsequent steps, so we obtain a separate token via
      # rust-lang/crates-io-auth-action for this publish step.
      - name: Authenticate to crates.io for tools/telepath
        id: auth
        if: ${{ steps.gate.outputs.should_publish_tools == 'true' }}
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish tools/telepath to crates.io
        if: ${{ steps.gate.outputs.should_publish_tools == 'true' }}
        working-directory: tools/telepath
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          # Resync the lockfile to the tagged version before publishing.
          # bump-excluded should have done this on the release PR branch, but as a
          # belt-and-suspenders guard we resync here so the lockfile is guaranteed
          # current even if that step was skipped or the branch was force-reset.
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          cargo update -p telepath --precise "$VERSION"
          # --allow-dirty: the only file that may be dirty after the update above is
          # Cargo.lock, which is not included in the published crate package.
          # Source files are clean (fresh CI checkout).
          cargo publish --allow-dirty

  # Opens / updates the release PR on every push to main.
  # Concurrency: cancel in-flight PR-update runs but never cancel a release run.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/rust-setup
        with:
          cache-key: release-plz-pr

      - id: release-plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      # Automatically bump the two excluded crates (tools/telepath and
      # examples/nrf52840-ping) to match the version that release-plz wrote
      # into the workspace Cargo.toml on the release PR branch.
      #
      # Commits via the GitHub API (not git push) so the resulting commit is
      # verified (signed by GitHub), matching the verification level of
      # release-plz's own commits on the same branch.
      #
      # Idempotent: exits without a commit if the excluded crates are already
      # at the target version (handles re-runs after force-updates by
      # release-plz, which regenerates the PR branch from scratch).
      - name: Bump excluded crates on release PR
        if: ${{ steps.release-plz.outputs.pr != '' }}
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          set -euo pipefail

          PR_JSON='${{ steps.release-plz.outputs.pr }}'
          BRANCH=$(echo "$PR_JSON" | jq -r '.head_branch // empty')
          if [ -z "$BRANCH" ]; then
            echo "No release PR branch found in output; skipping bump-excluded."
            exit 0
          fi

          # Fetch and switch to the release-plz PR branch.
          # Use -B to create-or-reset a local branch tracking origin/$BRANCH so
          # the subsequent push targets the right remote ref even when git DWIM
          # checkout would not set up tracking (e.g. detached-HEAD environments).
          git fetch origin "$BRANCH"
          git checkout -B "$BRANCH" "origin/$BRANCH"

          # Read the target version from the workspace via cargo metadata so the
          # read is robust against Cargo.toml whitespace or key-order changes.
          # telepath-wire inherits version from [workspace.package]; any member works.
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="telepath-wire") | .version')
          echo "Target version: $VERSION"

          # Check whether excluded crates already match — skip if they do.
          TOOLS_VER=$(grep -m1 '^version = ' tools/telepath/Cargo.toml \
                      | sed 's/version = "\(.*\)"/\1/')
          PING_VER=$(grep -m1 '^version = ' examples/nrf52840-ping/Cargo.toml \
                     | sed 's/version = "\(.*\)"/\1/')
          if [ "$TOOLS_VER" = "$VERSION" ] && [ "$PING_VER" = "$VERSION" ]; then
            echo "Excluded crates already at $VERSION; nothing to commit."
            exit 0
          fi

          just bump-excluded "$VERSION"

          if git diff --quiet; then
            echo "No changes after bump-excluded; nothing to commit."
            exit 0
          fi

          # Commit via GitHub API — verified automatically by GitHub.
          # No git commit or git push: those produce unsigned commits.
          REPO="${{ github.repository }}"

          # 1. Resolve the current branch HEAD SHA.
          HEAD_SHA=$(gh api "repos/${REPO}/git/ref/heads/${BRANCH}" \
            --jq '.object.sha')

          # 2. Resolve the base tree SHA from the HEAD commit.
          BASE_TREE=$(gh api "repos/${REPO}/git/commits/${HEAD_SHA}" \
            --jq '.tree.sha')

          # 3. Build a new tree containing the four changed files (Cargo.toml and
          # Cargo.lock for each excluded crate).  Including the lockfiles prevents
          # them from going stale after a version bump — without this, any `cargo`
          # invocation inside those directories would regenerate the lockfile and
          # produce an unexpected diff in contributors' working trees.
          # Use --rawfile so jq reads each file verbatim.
          TREE_PAYLOAD=$(jq -n \
            --arg base_tree "$BASE_TREE" \
            --rawfile tools_content tools/telepath/Cargo.toml \
            --rawfile tools_lock   tools/telepath/Cargo.lock \
            --rawfile ping_content examples/nrf52840-ping/Cargo.toml \
            --rawfile ping_lock    examples/nrf52840-ping/Cargo.lock \
            '{base_tree: $base_tree, tree: [
               {path: "tools/telepath/Cargo.toml",
                mode: "100644", type: "blob", content: $tools_content},
               {path: "tools/telepath/Cargo.lock",
                mode: "100644", type: "blob", content: $tools_lock},
               {path: "examples/nrf52840-ping/Cargo.toml",
                mode: "100644", type: "blob", content: $ping_content},
               {path: "examples/nrf52840-ping/Cargo.lock",
                mode: "100644", type: "blob", content: $ping_lock}
             ]}')
          NEW_TREE=$(echo "$TREE_PAYLOAD" \
            | gh api "repos/${REPO}/git/trees" \
                --method POST --input - \
                --jq '.sha')

          # 4. Create the commit — GitHub signs it automatically.
          COMMIT_PAYLOAD=$(jq -n \
            --arg msg "chore(release): bump excluded crates to ${VERSION}" \
            --arg tree "$NEW_TREE" \
            --arg parent "$HEAD_SHA" \
            '{message: $msg, tree: $tree, parents: [$parent]}')
          NEW_COMMIT=$(echo "$COMMIT_PAYLOAD" \
            | gh api "repos/${REPO}/git/commits" \
                --method POST --input - \
                --jq '.sha')
          echo "Created verified commit: $NEW_COMMIT"

          # 5. Advance the branch ref (fast-forward only).
          jq -n --arg sha "$NEW_COMMIT" '{sha: $sha, force: false}' \
            | gh api "repos/${REPO}/git/refs/heads/${BRANCH}" \
                --method PATCH --input -
          echo "Branch ${BRANCH} advanced to ${NEW_COMMIT}"

  # Builds 4 prebuilt binaries, attaches them to the draft GitHub Release created by
  # release-plz-release, then publishes the release.  Only runs when release-plz
  # produced a new telepath-wire tag (i.e. a real workspace version bump occurred).
  #
  # If this job fails the release remains as a draft — it is never published without
  # assets.  Recovery: re-run via workflow_dispatch with the `tag` input set.
  release-binaries:
    name: Release binaries
    needs: [release-plz-release]
    if: ${{ needs.release-plz-release.outputs.tag != '' }}
    permissions:
      contents: write
    uses: ./.github/workflows/release-binaries.yml
    with:
      tag: ${{ needs.release-plz-release.outputs.tag }}
    secrets: inherit
