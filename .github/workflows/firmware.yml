name: Firmware

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: "0"
  CARGO_NET_RETRY: "10"

jobs:
  firmware:
    name: Firmware (cross-compile nRF52840-DK)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect relevant changes
        id: guard
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch origin "$BASE" --depth=1 2>/dev/null || true
          CHANGED="$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || echo '')"
          if [[ -z "$CHANGED" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Firmware deps: wire + server + macros (no client — client is host-side only)
          PATTERNS='^(telepath-(wire|server|macros)/|examples/nrf52840-ping/|rust-toolchain\.toml$|\.github/(workflows/firmware\.yml|actions/rust-setup/))|Cargo\.(toml|lock)$'
          if echo "$CHANGED" | grep -qE "$PATTERNS"; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No firmware-relevant changes; skipping."
          fi

      - name: Setup Rust environment (embedded target)
        if: steps.guard.outputs.run == 'true'
        uses: ./.github/actions/rust-setup
        with:
          targets: thumbv7em-none-eabi
          cache-key: firmware-nrf52840
          cache-workspaces: examples/nrf52840-ping

      - name: Build firmware (release)
        if: steps.guard.outputs.run == 'true'
        working-directory: examples/nrf52840-ping
        run: cargo build --release
