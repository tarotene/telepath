[build]
target = "thumbv7em-none-eabi"

[target.thumbv7em-none-eabi]
# Prerequisites: udev rules must grant USB access to the probe.
# Create /etc/udev/rules.d/99-probe-rs.rules with:
#   ATTR{idVendor}=="1366", MODE="0666", GROUP="plugdev"
# Then: sudo udevadm control --reload-rules && sudo udevadm trigger
#
# --allow-erase-all: required on first flash when APPROTECT (readback protection)
# is active (factory default on nRF52840). The flag permits a full chip erase to
# unlock the device before programming. Safe to keep; has no effect once unlocked.
#
# To target a specific probe: probe-rs run --chip nRF52840_xxAA --probe 1366:1061
runner = "probe-rs run --chip nRF52840_xxAA --allow-erase-all"
rustflags = [
    "-C", "link-arg=-Tlink.x",
    # -Tdefmt.x removed: we use rtt-target directly instead of defmt-rtt
]
